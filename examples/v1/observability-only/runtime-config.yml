version: 1
profile: observability-only
providers:
  metrics:
    type: prometheus-compatible
    base_url: https://metrics.example.test
  alerts:
    type: vmalert
    base_url: https://alerts.example.test
  grafana:
    type: grafana
    base_url: https://grafana.example.test
policy:
  named_queries:
    service-up:
      expression: up
      label_keys: [job, instance]
  service_health:
    api:
      query_template: service-up
      healthy_when: { operator: gte, value: 1 }
      summary: Example API health
  dashboards:
    overview:
      uid: example-overview
      slug: example-overview
      title: Example overview
      panels:
        request-rate: { id: 1 }
