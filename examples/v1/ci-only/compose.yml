services:
  pak-satpam:
    build:
      context: ../../..
      dockerfile: Containerfile
    image: observability-agent-mcp:example-v1-ci
    platform: ${PLATFORM:-linux/amd64}
    command: ["dist/http-cli.js"]
    environment:
      MCP_HTTP_HOST: "0.0.0.0"
      MCP_HTTP_PORT: "8765"
      MCP_HTTP_ALLOWED_HOSTS: "mcp.example.test,127.0.0.1"
      OBSERVABILITY_PROVIDER_CONFIG: /run/runtime/provider-config.yml
      MCP_TOKEN_FILE: /run/runtime/mcp-token
    ports:
      - "127.0.0.1:8765:8765"
    volumes:
      - ./runtime-config.yml:/run/runtime/provider-config.yml:ro
      - ./secrets/mcp-token:/run/runtime/mcp-token:ro
      - ./secrets/github-app-id:/run/secrets/github-app-id:ro
      - ./secrets/github-app-key:/run/secrets/github-app-key:ro
      - ./secrets/github-installation-id:/run/secrets/github-installation-id:ro
      - ./secrets/approval-key:/run/secrets/approval-key:ro
    tmpfs:
      - /run/runtime/state:uid=1000,gid=1000,mode=700
