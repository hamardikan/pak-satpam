name: validate-mcp-registry

# This workflow validates registry metadata only. Publishing remains an explicit
# maintainer action and is intentionally not performed by CI.
on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22.22.3
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run build
      - run: node scripts/validate-package-metadata.mjs --require-built
      - run: npm pack --dry-run
